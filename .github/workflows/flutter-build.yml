name: Build Windows Flutter (Portable EXE)

on:
  workflow_dispatch:
  push:
    branches: [ master ]

jobs:
  build-windows-flutter:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup MSVC (x64)
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Install Rust stable
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-pc-windows-msvc

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.5'
        channel: 'stable'
        cache: true

    - name: Clone vcpkg
      run: |
        git clone https://github.com/microsoft/vcpkg
        echo "VCPKG_ROOT=$PWD/vcpkg" >> $GITHUB_ENV

    - name: Bootstrap vcpkg
      run: |
        $VCPKG_ROOT/bootstrap-vcpkg.bat

    - name: Install LLVM (for bindgen)
      run: choco install llvm --version=15.0.7 --allow-downgrade -y

    - name: Cache cargo registry and vcpkg
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          vcpkg/installed
        key: windows-flutter-${{ hashFiles('**/Cargo.lock', 'vcpkg.json') }}

    # ✅ 关键修正：manifest 模式，不带包名
    - name: Install vcpkg dependencies (manifest mode)
      run: |
        $VCPKG_ROOT/vcpkg install --triplet x64-windows-static

    - name: Install flutter_rust_bridge_codegen
      run: cargo install flutter_rust_bridge_codegen --version 1.82.6

    - name: Setup sccache
      uses: mozilla-actions/sccache-action@v0.0.6

    - name: Set Environment Variables
      run: |
        echo "LIBCLANG_PATH=C:/Program Files/LLVM/lib" >> $GITHUB_ENV
        echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
        echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
        echo "PUB_HOSTED_URL=https://pub.flutter-io.cn" >> $GITHUB_ENV
        echo "FLUTTER_STORAGE_BASE_URL=https://storage.flutter-io.cn" >> $GITHUB_ENV

    - name: Build Portable EXE
      run: |
        python build.py --flutter --portable --hwcodec --vram

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: rustdesk-flutter-portable
        path: rustdesk_portable.exe
