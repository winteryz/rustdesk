name: Build RustDesk Windows Flutter

on:
  workflow_dispatch: # 手动触发
  push:
    branches: [ master ]
    paths-ignore: [ '**.md' ] # 改文档不触发编译

env:
  # 官方验证过的版本，严禁修改！
  LLVM_VERSION: "15.0.6"
  FLUTTER_VERSION: "3.24.5"
  RUST_VERSION: "1.75"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b" # 官方钉死的vcpkg版本
  VERSION: "1.4.9"
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite" # 启用GitHub Actions二进制缓存
  UPLOAD_ARTIFACT: true

jobs:
  # 生成Rust-Dart桥接文件（如果你的fork代码里已经有flutter/lib/generated_bridge.dart和src/bridge_generated.rs，可以删除整个generate-bridge job，同时删掉下面build步骤里的Restore bridge files）
  generate-bridge:
    uses: ./.github/workflows/bridge.yml

  # 编译Windows置顶窗口工具（RustDesk依赖）
  build-RustDeskTempTopMostWindow:
    name: Build TopMostWindow
    runs-on: windows-2022
    strategy:
      matrix:
        job:
          - { target: windows-2022, platform: x64 } # 只保留x64，删除ARM64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-msbuild@v2
      - run: msbuild res/topmostwindow/TopMostWindow.sln -p:Configuration=Release -p:Platform=${{ matrix.job.platform }}
      - uses: actions/upload-artifact@v7
        with:
          name: topmostwindow-artifacts-x64
          path: res/topmostwindow/x64/Release/TopMostWindow.exe

  # 核心：编译Windows Flutter版本
  build-for-windows-flutter:
    name: Build Windows x64 Flutter
    needs: [build-RustDeskTempTopMostWindow, generate-bridge]
    runs-on: windows-2022 # 严禁改为windows-latest！会导致aom编译失败
    steps:
      # 1. 启用GitHub Actions缓存（给vcpkg二进制缓存用）
      - name: Export cache env vars
        uses: actions/github-script@v6
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      # 2. 拉取代码
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # 3. 缓存：Cargo registry/git（加速Rust依赖下载）
      - name: Cache cargo registry/git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: windows-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-cargo-

      # 4. 缓存：vcpkg已编译的依赖（核心加速点，第一次编译后后续直接复用）
      - name: Cache vcpkg installed
        uses: actions/cache@v4
        with:
          path: C:/vcpkg/installed
          key: windows-vcpkg-${{ hashFiles('vcpkg.json') }}
          restore-keys: windows-vcpkg-

      # 5. 缓存：Flutter pub依赖
      - name: Cache pub-cache
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: windows-pub-${{ hashFiles('flutter/pubspec.lock') }}
          restore-keys: windows-pub-

      # 6. 缓存：Flutter引擎（避免每次重新下载引擎）
      - name: Cache flutter engine
        uses: actions/cache@v4
        with:
          path: flutter/bin/cache
          key: windows-flutter-${{ env.FLUTTER_VERSION }}
          restore-keys: windows-flutter-

      # 7. 恢复桥接文件（如果删除了generate-bridge job，此步骤也删除）
      - name: Restore bridge files
        uses: actions/download-artifact@v8
        with:
          name: bridge-artifact
          path: ./

      # 8. 安装LLVM（官方验证版本）
      - name: Install LLVM
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: ${{ env.LLVM_VERSION }}

      # 9. 安装Flutter（官方验证版本）
      - name: Install flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true # 启用Flutter SDK缓存
          architecture: x64

      # 10. 替换Flutter引擎为RustDesk定制版（官方必需步骤）
      - name: Replace flutter engine
        run: |
          flutter precache --windows
          Invoke-WebRequest -Uri https://github.com/rustdesk/engine/releases/download/main/windows-x64-release.zip -OutFile windows-x64-release.zip
          Expand-Archive -Path windows-x64-release.zip -DestinationPath windows-x64-release
          mv -Force windows-x64-release/*  C:/hostedtoolcache/windows/flutter/stable-${{ env.FLUTTER_VERSION }}-x64/bin/cache/artifacts/engine/windows-x64-release/

      # 11. 应用Flutter补丁（官方必需步骤）
      - name: Patch flutter
        shell: bash
        run: |
          cp .github/patches/flutter_3.24.4_dropdown_menu_enableFilter.diff $(dirname $(dirname $(which flutter)))
          cd $(dirname $(dirname $(which flutter)))
          [[ "3.24.5" == ${{env.FLUTTER_VERSION}} ]] && git apply flutter_3.24.4_dropdown_menu_enableFilter.diff

      # 12. 安装Rust工具链
      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-pc-windows-msvc
          components: rustfmt

      # 13. Rust编译缓存（加速Rust代码编译）
      - name: Cache Rust compilation
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: windows-flutter
          key: x64-${{ hashFiles('**/Cargo.lock') }}

      # 14. 安装vcpkg依赖（复用缓存，第一次编译后后续直接跳过）
      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: C:\vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install vcpkg deps
        run: |
          $VCPKG_ROOT/vcpkg install --triplet x64-windows-static --x-install-root="$VCPKG_ROOT/installed"
        shell: bash

      # 15. 编译RustDesk核心
      - name: Build rustdesk
        run: |
          python3 .\build.py --portable --flutter --skip-portable-pack --hwcodec --vram
          mv ./flutter/build/windows/x64/runner/Release ./rustdesk
          # 下载虚拟显示器驱动
          Invoke-WebRequest -Uri https://github.com/rustdesk-org/rdev/releases/download/usbmmidd_v2/usbmmidd_v2.zip -OutFile usbmmidd_v2.zip
          Expand-Archive usbmmidd_v2.zip -DestinationPath .
          Remove-Item -Path usbmmidd_v2\Win32 -Recurse
          Remove-Item -Path "usbmmidd_v2\deviceinstaller64.exe", "usbmmidd_v2\deviceinstaller.exe", "usbmmidd_v2\usbmmidd.bat"
          mv -Force .\usbmmidd_v2 ./rustdesk

      # 16. 下载置顶窗口工具
      - name: Download TopMostWindow
        if: env.UPLOAD_ARTIFACT == 'true'
        uses: actions/download-artifact@v8
        with:
          name: topmostwindow-artifacts-x64
          path: "./rustdesk"

      # 17. 打包为便携版exe
      - name: Build portable exe
        shell: bash
        run: |
          sed -i '/dpiAware/d' res/manifest.xml
          pushd ./libs/portable
          pip3 install -r requirements.txt
          python3 ./generate.py -f ../../rustdesk/ -o . -e ../../rustdesk/rustdesk.exe
          popd
          mkdir -p ./SignOutput
          mv ./target/release/rustdesk-portable-packer.exe ./SignOutput/rustdesk-${{ env.VERSION }}-x64.exe

      # 18. 上传产物
      - name: Upload artifact
        if: env.UPLOAD_ARTIFACT == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: rustdesk-windows-x64-portable
          path: SignOutput/rustdesk-${{ env.VERSION }}-x64.exe
