name: Build Windows Flutter (Portable EXE)

on:
  workflow_dispatch:
  push:
    branches: [ master ]

jobs:
  build-windows-flutter:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup MSVC (x64)
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Install Rust stable
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-pc-windows-msvc

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.5' # RustDesk 1.4.x 对应版本
        channel: 'stable'
        cache: true # 开启 Flutter 缓存

    - name: Setup vcpkg
      shell: pwsh
      run: |
        git clone https://github.com/microsoft/vcpkg
        cd vcpkg
        ./bootstrap-vcpkg.bat
        echo "VCPKG_ROOT=$PWD" >> $env:GITHUB_ENV
        echo "$PWD" >> $env:GITHUB_PATH

    - name: Install LLVM
      run: choco install llvm --version=15.0.7 --allow-downgrade -y

    - name: Setup sccache (Rust Cache)
      uses: mozilla-actions/sccache-action@v0.0.6
      # 这是 Flutter 路提速的核心，避免 Rust 重复编译

    - name: Cache cargo registry and vcpkg
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          vcpkg/installed
        key: windows-flutter-${{ hashFiles('**/Cargo.lock', 'vcpkg.json') }}

    - name: Install vcpkg dependencies
      run: |
        $$VCPKG_ROOT/vcpkg install --triplet x64-windows-static
        
    - name: Install flutter_rust_bridge_codegen
      # 锁定版本，防止 API 变更导致编译失败
      run: cargo install flutter_rust_bridge_codegen --version 1.82.6

    - name: Setup Env Vars
      run: |
        echo "LIBCLANG_PATH=C:/Program Files/LLVM/lib" >> $GITHUB_ENV
        echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
        echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
        # 设置 Dart/Flutter 国内镜像（Actions 虽然能直连，但设了更快）
        echo "PUB_HOSTED_URL=https://pub.flutter-io.cn" >> $GITHUB_ENV
        echo "FLUTTER_STORAGE_BASE_URL=https://storage.flutter-io.cn" >> $GITHUB_ENV

    - name: Build Portable EXE
      run: |
        python build.py --flutter --portable --hwcodec --vram
        # build.py 会自动处理 codegen -> flutter build -> cargo build -> 打包

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: rustdesk-flutter-portable
        path: rustdesk_portable.exe
