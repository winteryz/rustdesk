name: Build RustDesk for Windows (Optimized)

on:
  workflow_call:
    inputs:
      upload-artifact:
        type: boolean
        default: true
      upload-tag:
        type: string
        default: "nightly"

env:
  SCITER_RUST_VERSION: "1.75"
  RUST_VERSION: "1.75"
  LLVM_VERSION: "15.0.6"
  FLUTTER_VERSION: "3.24.5"
  FLUTTER_WINDOWS_ARM_VERSION: "3.44.0"
  TAG_NAME: "${{ inputs.upload-tag }}"
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  VERSION: "1.4.9"
  UPLOAD_ARTIFACT: "${{ inputs.upload-artifact }}"
  SIGN_BASE_URL: "${{ secrets.SIGN_BASE_URL }}-2"

jobs:
  generate-bridge:
    uses: ./.github/workflows/bridge.yml

  build-RustDeskTempTopMostWindow:
    uses: ./.github/workflows/third-party-RustDeskTempTopMostWindow.yml
    strategy:
      fail-fast: false
      matrix:
        job:
          - { target: windows-2022, platform: x64 }
          - { target: windows-11-arm, platform: ARM64 }
    with:
      upload-artifact: ${{ inputs.upload-artifact }}
      target: ${{ matrix.job.target }}
      configuration: Release
      platform: ${{ matrix.job.platform }}
      target_version: Windows10

  build-for-windows-flutter:
    name: ${{ matrix.job.target }}
    needs: [build-RustDeskTempTopMostWindow, generate-bridge]
    runs-on: ${{ matrix.job.os }}
    strategy:
      fail-fast: false
      matrix:
        job:
          - {
              target: x86_64-pc-windows-msvc,
              os: windows-2022,
              arch: x86_64,
              flutter-arch: x64,
              vcpkg-triplet: x64-windows-static,
              build-args: "--vram",
            }
    steps:
      # ---------- 缓存环境 ----------
      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@d7906e4ad0b1822421a7e6a35d5ca353c962f410 # v6
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      # ---------- Git ----------
      - name: Cache git repository
        uses: actions/cache@v4
        with:
          path: |
            ~/.gitconfig
            .git/modules
          key: ${{ runner.os }}-git-${{ hashFiles('.gitmodules') }}

      - name: Checkout source code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
          fetch-depth: 0

      # ---------- Bridge ----------
      - name: Restore bridge files
        uses: actions/cache@v4
        id: cache-bridge
        with:
          path: ./flutter/lib/models/*.freezed.dart
          key: ${{ runner.os }}-bridge-${{ hashFiles('flutter/lib/models/**/*.dart') }}

      - name: Download bridge files (fallback)
        if: steps.cache-bridge.outputs.cache-hit != 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bridge-artifact
          path: ./

      # ---------- LLVM ----------
      - name: Cache LLVM and Clang
        uses: actions/cache@v4
        id: cache-llvm
        with:
          path: |
            C:\Program Files\LLVM
            C:\ProgramData\chocolatey\lib\llvm
          key: ${{ runner.os }}-llvm-${{ env.LLVM_VERSION }}

      - name: Install LLVM and Clang
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        uses: KyleMayes/install-llvm-action@ebc0426251bc40c7cd31162802432c68818ab8f0 # v2.0.9
        with:
          version: ${{ env.LLVM_VERSION }}

      # ---------- Flutter ----------
      - name: Cache Flutter SDK
        uses: actions/cache@v4
        id: cache-flutter
        with:
          path: |
            ${{ runner.tool_cache }}/flutter
            C:\hostedtoolcache\windows\flutter
          key: ${{ runner.os }}-flutter-${{ env.FLUTTER_VERSION }}-${{ matrix.job.arch }}

      - name: Install flutter
        if: steps.cache-flutter.outputs.cache-hit != 'true'
        id: flutter
        uses: subosito/flutter-action@2783a3f08e1baf891508463f8c6653c258246225 # v2.12.0
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          architecture: x64
          cache: true

      - name: Cache Flutter pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.LOCALAPPDATA }}\Pub\Cache
            ~/.pub-cache
          key: ${{ runner.os }}-flutter-pub-${{ hashFiles('flutter/pubspec.yaml') }}

      # ---------- 自定义 Flutter Engine ----------
      - name: Cache Flutter Engine
        uses: actions/cache@v4
        id: cache-engine
        with:
          path: windows-x64-release.zip
          key: flutter-engine-${{ env.FLUTTER_VERSION }}-windows-x64

      - name: Download custom flutter engine
        if: matrix.job.arch == 'x86_64' && steps.cache-engine.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          Invoke-WebRequest `
            -Uri https://github.com/rustdesk/engine/releases/download/main/windows-x64-release.zip `
            -OutFile windows-x64-release.zip

      - name: Replace engine with rustdesk custom flutter engine
        if: matrix.job.arch == 'x86_64'
        shell: pwsh
        run: |
          flutter precache --windows

          Expand-Archive windows-x64-release.zip -DestinationPath windows-x64-release -Force

          $flutterExe = Get-Command flutter | Select-Object -ExpandProperty Source
          $flutterRoot = Split-Path -Parent (Split-Path -Parent $flutterExe)
          $enginePath = Join-Path $flutterRoot "bin\cache\artifacts\engine\windows-x64-release"

          New-Item -ItemType Directory -Path $enginePath -Force | Out-Null
          Copy-Item -Path windows-x64-release\* -Destination $enginePath -Recurse -Force

      # ---------- Rust ----------
      - name: Cache Rust toolchain
        uses: actions/cache@v4
        with:
          path: |
            ~/.rustup
            ~/.cargo
          key: ${{ runner.os }}-rust-${{ env.SCITER_RUST_VERSION }}-${{ matrix.job.target }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ env.SCITER_RUST_VERSION }}
          targets: ${{ matrix.job.target }}
          components: rustfmt

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          prefix-key: ${{ matrix.job.os }}-${{ matrix.job.arch }}
          key: ${{ matrix.job.target }}-${{ hashFiles('**/Cargo.lock') }}

      # ---------- vcpkg（✅ 已完全修复） ----------
      - name: Cache vcpkg packages
        uses: actions/cache@v4
        id: cache-vcpkg
        with:
          path: |
            C:\vcpkg\installed
            C:\vcpkg\buildtrees
            C:\vcpkg\downloads
          key: ${{ runner.os }}-vcpkg-${{ matrix.job.vcpkg-triplet }}-${{ env.VCPKG_COMMIT_ID }}-${{ hashFiles('vcpkg.json') }}

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@b1a0dd252f06b9e25b3c022a9a03bd7a427fb6a2 # v11
        with:
          vcpkgDirectory: C:\vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install vcpkg dependencies
        env:
          VCPKG_DEFAULT_HOST_TRIPLET: ${{ matrix.job.vcpkg-triplet }}
        shell: pwsh
        run: |
          $stamp = "C:\vcpkg\installed\${{ matrix.job.vcpkg-triplet }}\.stamp"
          $vcpkgExe = Join-Path $env:VCPKG_ROOT "vcpkg.exe"
          $installRoot = Join-Path $env:VCPKG_ROOT "installed"

          if (-not (Test-Path $stamp)) {
            & $vcpkgExe install `
              --triplet ${{ matrix.job.vcpkg-triplet }} `
              --x-install-root="$installRoot"

            if ($LASTEXITCODE -ne 0) {
              Get-ChildItem "$env:VCPKG_ROOT" -Recurse -Filter "*.log" | ForEach-Object {
                Write-Host "$($_.FullName):"
                Write-Host "======"
                Get-Content $_.FullName
                Write-Host "======"
              }
              exit 1
            }

            New-Item -ItemType File -Path $stamp -Force | Out-Null
          }

          $log = Join-Path $env:VCPKG_ROOT "buildtrees/ffmpeg/build-${{ matrix.job.vcpkg-triplet }}-rel-out.log"
          if (Test-Path $log) {
            Get-Content $log -Head 100
          }

      # ---------- SODIUM_LIB_DIR ----------
      - name: Set SODIUM_LIB_DIR
        if: matrix.job.arch == 'aarch64'
        shell: bash
        run: echo "SODIUM_LIB_DIR=$VCPKG_ROOT/installed/${{ matrix.job.vcpkg-triplet }}/lib" >> "$GITHUB_ENV"

      # ---------- 外部依赖 ----------
      - name: Cache external downloads
        uses: actions/cache@v4
        with:
          path: |
            usbmmidd_v2.zip
            rustdesk_printer_driver_v4-1.4.zip
            printer_driver_adapter.zip
            sha256sums
          key: ${{ runner.os }}-downloads-${{ hashFiles('res/job.py') }}

      # ---------- Build ----------
      - name: Build rustdesk
        shell: pwsh
        run: |
          python3 .\build.py --portable --flutter --skip-portable-pack --hwcodec ${{ matrix.job.build-args }}
          mv ./flutter/build/windows/${{ matrix.job.flutter-arch }}/runner/Release ./rustdesk

          if (!(Test-Path usbmmidd_v2.zip)) {
            Invoke-WebRequest -Uri https://github.com/rustdesk-org/rdev/releases/download/usbmmidd_v2/usbmmidd_v2.zip -OutFile usbmmidd_v2.zip
          }
          Expand-Archive usbmmidd_v2.zip -DestinationPath .
          Remove-Item -Recurse -Force usbmmidd_v2\Win32 -ErrorAction SilentlyContinue
          Remove-Item -Force usbmmidd_v2\deviceinstaller*.exe, usbmmidd_v2\usbmmidd.bat -ErrorAction SilentlyContinue
          mv -Force usbmmidd_v2 ./rustdesk

          try {
            if (!(Test-Path rustdesk_printer_driver_v4-1.4.zip)) {
              Invoke-WebRequest -Uri https://github.com/rustdesk/hbb_common/releases/download/driver/rustdesk_printer_driver_v4-1.4.zip -OutFile rustdesk_printer_driver_v4-1.4.zip
              Invoke-WebRequest -Uri https://github.com/rustdesk/hbb_common/releases/download/driver/printer_driver_adapter.zip -OutFile printer_driver_adapter.zip
              Invoke-WebRequest -Uri https://github.com/rustdesk/hbb_common/releases/download/driver/sha256sums -OutFile sha256sums
            }

            $ok = $true
            $ok = $ok -and ((Get-FileHash rustdesk_printer_driver_v4-1.4.zip -Algorithm SHA256).Hash -eq
              (Select-String sha256sums -Pattern 'rustdesk_printer_driver_v4-1\.4\.zip').Line.Split(' ')[0])
            $ok = $ok -and ((Get-FileHash printer_driver_adapter.zip -Algorithm SHA256).Hash -eq
              (Select-String sha256sums -Pattern 'printer_driver_adapter\.zip').Line.Split(' ')[0])

            if ($ok) {
              Expand-Archive rustdesk_printer_driver_v4-1.4.zip -DestinationPath .
              New-Item ./rustdesk/drivers -ItemType Directory -Force | Out-Null
              mv rustdesk_printer_driver_v4-1.4 ./rustdesk/drivers/RustDeskPrinterDriver
              Expand-Archive printer_driver_adapter.zip -DestinationPath .
              mv printer_driver_adapter.dll ./rustdesk
            }
          } catch {
            Write-Host "Ignore printer driver error"
          }

      # ---------- Artifacts ----------
      - name: Download TopMostWindow
        if: inputs.upload-artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: topmostwindow-artifacts-x64
          path: rustdesk

      - name: Upload unsigned
        if: env.UPLOAD_ARTIFACT == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rustdesk-unsigned-windows-${{ matrix.job.arch }}
          path: rustdesk
          retention-days: 7

      # ---------- MSI / EXE ----------
      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@6fb02220983dee41ce7ae257b6f4d8f9bf5ed4ce # v2

      - name: Build msi
        if: env.UPLOAD_ARTIFACT == 'true'
        shell: pwsh
        run: |
          pushd res/msi
          python preprocess.py --arp -d ../../rustdesk
          nuget restore msi.sln
          msbuild msi.sln -p:Configuration=Release -p:Platform=x64 /p:TargetVersion=Windows10
          $msi = Get-ChildItem Package/bin/*/Release/en-us/*.msi | Select-Object -First 1
          mv $msi.FullName ../../SignOutput/rustdesk-${{ env.VERSION }}-${{ matrix.job.arch }}.msi
          popd

      - name: Publish Release
        if: env.UPLOAD_ARTIFACT == 'true'
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844 # v1
        with:
          prerelease: true
          tag_name: ${{ env.TAG_NAME }}
          files: |
            SignOutput/rustdesk-*.msi
            SignOutput/rustdesk-*.exe
